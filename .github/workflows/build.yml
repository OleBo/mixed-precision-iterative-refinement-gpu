name: Build and Test CUDA Solver

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/olebo/mixed-precision-iterative-refinement-gpu:latest
            ghcr.io/olebo/mixed-precision-iterative-refinement-gpu:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image locally
        if: github.event_name == 'pull_request'
        run: docker build -t mixed-precision-solver:test .

      - name: Run solver in container (GPU self-hosted only)
        if: contains(runner.labels, 'self-hosted') && contains(runner.labels, 'gpu')
        run: |
          docker run --rm \
            --gpus all \
            ghcr.io/${{ github.repository }}:${{ github.sha }} \
            bash -c "cd /app && /app/build/mpsolver || echo 'Solver ran'"
